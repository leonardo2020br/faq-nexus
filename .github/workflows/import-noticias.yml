name: Importar Noticias Contabeis

on:
  schedule:
    # 10:00 UTC = 07:00 Brasilia
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Maximo de artigos a importar'
        required: false
        default: '20'
      days_back:
        description: 'Ignorar artigos mais antigos que N dias'
        required: false
        default: '60'
      reset:
        description: 'Apagar e reimportar TODOS (true = sim, false = nao)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Importar noticias do RSS
        run: |
          MAX=${{ github.event.inputs.max_articles || 20 }}
          DAYS=${{ github.event.inputs.days_back || 60 }}
          RESET=${{ github.event.inputs.reset || 'false' }}
          RESET_FLAG=""
          if [ "$RESET" = "true" ]; then
            RESET_FLAG="--reset"
          fi
          python scripts/import-noticias.py --max "$MAX" --days "$DAYS" $RESET_FLAG

      - name: Verificar mudancas
        id: check_changes
        run: |
          git add -A _content/noticias/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nenhuma noticia nova."
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Noticias novas: $COUNT"
          fi

      - name: Commitar e publicar
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: noticias importadas do Contabeis ($DATE)"
          git push
